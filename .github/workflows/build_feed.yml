name: Build Feed (Force Upload Definitivo)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib pandas

      # Determina se è la prima run del giorno
      - name: Determine if first run of the day
        id: daterun
        run: |
          TODAY=$(date +'%Y-%m-%d')
          echo "TODAY=$TODAY" >> $GITHUB_ENV

          if [ -f last_run_date.txt ]; then
            LAST=$(cat last_run_date.txt)
          else
            LAST="none"
          fi

          echo "LAST_RUN_DATE=$LAST" >> $GITHUB_ENV

          if [ "$TODAY" != "$LAST" ]; then
            echo "first_run=true" >> $GITHUB_OUTPUT
          else
            echo "first_run=false" >> $GITHUB_OUTPUT
          fi

      # Scarica snapshot SOLO nella prima run del giorno
      - name: Download snapshot artifact
        if: steps.daterun.outputs.first_run == 'true'
        uses: actions/download-artifact@v4
        with:
          name: daily-snapshot
          path: daily_snapshots
        continue-on-error: true

      - name: Verifica snapshot
        run: |
          echo "📁 Contenuto snapshot:"
          ls -l daily_snapshots || true

      - name: Generate filtered feed
        run: python process_and_upload.py

      # Carica snapshot SOLO nella prima run del giorno
      - name: Upload snapshot artifact
        if: steps.daterun.outputs.first_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: daily-snapshot
          path: daily_snapshots

      # Aggiorna last_run_date SOLO nella prima run del giorno
      - name: Update last_run_date
        if: steps.daterun.outputs.first_run == 'true'
        run: |
          echo "$TODAY" > last_run_date.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_run_date.txt
          git commit -m "Update last run date" || true
          git push

      - name: Check if feed changed
        id: feedcheck
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          if git diff --quiet feed_poleepo.csv; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Ricrea SEMPRE sa.json prima dell’upload su Drive
      - name: Prepare Google service account JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}" | base64 -d > sa.json
          echo "✅ Service account JSON pronto"

      - name: Upload feed to Google Drive
        if: steps.feedcheck.outputs.changed == 'true'
        env:
          FILE_ID: "1DuupFBUm6pfjEZp7js6WDqDfJSLEda5r"
        run: |
          python3 - << 'EOF'
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          import os

          FILE_ID = os.environ["FILE_ID"]

          creds = service_account.Credentials.from_service_account_file(
              "sa.json",
              scopes=["https://www.googleapis.com/auth/drive"]
          )

          service = build("drive", "v3", credentials=creds)

          media = MediaFileUpload("feed_poleepo.csv", mimetype="text/csv", resumable=False)
          service.files().update(fileId=FILE_ID, media_body=media).execute()
          print("✅ File aggiornato su Google Drive")
          EOF

      - name: Commit feed only if changed
        if: steps.feedcheck.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add feed_poleepo.csv
          git commit -m "Update feed" || echo "Nessuna modifica"
          git push
