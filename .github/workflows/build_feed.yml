name: Build Filtered CSV Feed

on:
  schedule:
    - cron: '0 * * * *'  # ogni ora
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ Checkout codice
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    # 3️⃣ Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib

    # 4️⃣ Scrivere credenziali service account dal secret
    - name: Write Service Account JSON
      run: |
        echo "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" > service_account.json

    # 5️⃣ Generazione filtered.csv
    - name: Generate filtered CSV
      run: |
        python filter_feed.py

    # 6️⃣ Upload su Google Drive
    - name: Upload filtered.csv to Drive
      run: |
        python upload_to_drive.py

    # 7️⃣ Optional log
    - name: Confirm
      run: |
        echo "filtered.csv aggiornato su Drive. Apps Script può generare filtered_clean.csv automaticamente."
