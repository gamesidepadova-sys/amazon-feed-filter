name: Build Filtered CSV Feed

on:
  schedule:
    - cron: '0 * * * *'  # ogni ora
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib

    - name: Write Service Account JSON
      run: |
        echo "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" > service_account.json

    - name: Generate filtered CSV
      run: |
        python filter_feed.py

    - name: Upload filtered CSV to Drive
      run: |
        python upload_csv_to_sheet.py

    - name: Confirm
      run: |
        echo "filtered_clean.csv aggiornato su Drive"
