name: Build filtered CSV feed

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: feed-filter
  cancel-in-progress: true

jobs:
  build_feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth google-auth-httplib2

      - name: Download source CSV
        run: |
          curl -L --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 3600 \
            "${{ secrets.SOURCE_CSV_URL }}" -o source.csv

      - name: Filter CSV
        run: |
          python filter_feed.py
          ls -lh filtered.csv

      ########################################################
      # CACHE HASH
      ########################################################
      - name: Restore CSV hash cache
        uses: actions/cache@v4
        with:
          path: .cache
          key: csv-hash-${{ github.ref_name }}
          restore-keys: csv-hash-

      - name: Check if CSV changed
        id: check_csv
        run: |
          mkdir -p .cache
          FILE=filtered.csv
          NEW_HASH=$(md5sum "$FILE" | awk '{print $1}')
          OLD_HASH=$(cat .cache/${FILE}.md5 2>/dev/null || true)

          if [ "$NEW_HASH" = "$OLD_HASH" ] && [ -n "$NEW_HASH" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "CSV non cambiato"
          else
            echo "$NEW_HASH" > .cache/${FILE}.md5
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "CSV cambiato"
          fi

      ########################################################
      # UPLOAD SOLO SE CAMBIATO
      ########################################################
      - name: Write Google service account JSON
        if: steps.check_csv.outputs.changed == 'true'
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
        run: echo "$GDRIVE_SA_JSON" > sa.json

      - name: Upload filtered.csv to Google Sheet "Filtered"
        if: steps.check_csv.outputs.changed == 'true'
        env:
          FILTERED_SHEET_ID: ${{ secrets.FILTERED_SHEET_ID }}
          INPUT_CSV: filtered.csv
          FILTERED_SHEET_NAME: Filtered
        run: python upload_csv_to_sheet.py
