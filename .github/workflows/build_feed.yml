name: Build & Upload Filtered CSV Feed

on:
  schedule:
    - cron: '0 * * * *'  # ogni ora
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Create service account file
      run: |
        printf "%s" '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > service_account.json

    - name: Run filtering and upload script
      run: python process_and_upload.py
