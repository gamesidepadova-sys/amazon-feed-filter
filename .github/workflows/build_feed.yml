name: Build filtered CSV feed

on:
  schedule:
    - cron: "*/15 * * * *"   # ogni 15 minuti
  workflow_dispatch:

concurrency:
  group: feed-filter
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Scarica source CSV
      - name: Download source CSV
        run: |
          set -e
          echo "Downloading source..."
          curl -L --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 3600 \
            -w "\nHTTP_CODE=%{http_code}\nFINAL_URL=%{url_effective}\n" \
            "${{ secrets.SOURCE_CSV_URL }}" -o source.csv
          echo "Downloaded file:"; ls -lh source.csv
          echo "Header preview:"; head -n 2 source.csv | cat

      # 3️⃣ Filtra CSV
      - name: Filter CSV
        run: |
          set -e
          python filter_feed.py
          echo "Filtered file:"; ls -lh filtered.csv
          echo "Header preview:"; head -n 2 filtered.csv | cat

      # 4️⃣ Installa dipendenze Google API
      - name: Install Google API deps
        run: |
          set -e
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      # 5️⃣ Scrive service account JSON
      - name: Write service account JSON to file
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
        run: |
          set -e
          echo "$GDRIVE_SA_JSON" > sa.json
          python - << 'PY'
          import json
          with open("sa.json","r",encoding="utf-8") as f:
              obj = json.load(f)
          print("SA client_email:", obj.get("client_email"))
          PY

      # 6️⃣ Upload filtered.csv su Drive (overwrite fileId)
      - name: Upload filtered.csv to Google Drive
        env:
          GDRIVE_FILE_ID: ${{ secrets.GDRIVE_FILE_ID }}
        run: |
          set -e
          python - << 'PY'
          import os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          file_id = os.environ.get("GDRIVE_FILE_ID","").strip()
          if not file_id:
              raise RuntimeError("GDRIVE_FILE_ID is empty or missing")

          creds = service_account.Credentials.from_service_account_file(
              "sa.json",
              scopes=["https://www.googleapis.com/auth/drive"]
          )
          service = build("drive", "v3", credentials=creds)

          media = MediaFileUpload("filtered.csv", mimetype="text/csv", resumable=True)
          updated = service.files().update(fileId=file_id, media_body=media).execute()
          print("Updated Drive file:", updated.get("id"))
          PY

      # 7️⃣ Esegui Apps Script per pulire il CSV
      - name: Clean filtered CSV via Apps Script
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}  # ID del progetto Apps Script con funzione cleanFilteredCSV
        run: |
          set -e
          python - << 'PY'
          import os, json
          from google.oauth2 import service_account
          from googleapiclient.discovery import build

          sa_json = os.environ["GDRIVE_SA_JSON"]
          script_id = os.environ["SCRIPT_ID"]

          creds = service_account.Credentials.from_service_account_info(
              json.loads(sa_json),
              scopes=["https://www.googleapis.com/auth/script.projects",
                      "https://www.googleapis.com/auth/script.external_request",
                      "https://www.googleapis.com/auth/drive"]
          )

          service = build('script', 'v1', credentials=creds)

          request = {"function": "cleanFilteredCSV"}

          resp = service.scripts().run(body=request, scriptId=script_id).execute()

          if 'error' in resp:
              err = resp['error']['details'][0]
              raise RuntimeError(f"Apps Script error: {err}")
          else:
              print("Apps Script executed successfully:", resp)
          PY

      # 8️⃣ Upload artifact debug (opzionale)
      - name: Upload artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: filtered-feed
          path: filtered.csv
          if-no-files-found: error
          retention-days: 3
