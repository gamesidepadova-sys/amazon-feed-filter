name: Build Feed

on:
  schedule:
    - cron: "0 * * * *"   # ogni ora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python senza caching
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # 3️⃣ Installa dipendenze manualmente
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      # 4️⃣ Crea service account JSON da Base64
      - name: Prepare Google service account JSON
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}" | base64 -d > sa.json
          echo "✅ Service account JSON pronto"

      # 5️⃣ Validazione JSON
      - name: Validate service account JSON
        run: |
          python3 - << 'EOF'
          import json
          with open("sa.json") as f:
              json.load(f)
          print("✅ Service account JSON valido")
          EOF

      # 6️⃣ Genera feed
      - name: Generate filtered feed
        run: python process_and_upload.py

      # 7️⃣ Controlla se il feed è cambiato
      - name: Check if feed changed
        id: feed_check
        run: |
          git add feed_poleepo.csv
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Nessun cambiamento nel feed"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Feed modificato, pronto per upload"
          fi

      # 8️⃣ Upload su Google Drive solo se cambia
      - name: Upload feed to Google Drive
        if: steps.feed_check.outputs.changed == 'true'
        env:
          FILE_ID: "1DuupFBUm6pfjEZp7js6WDqDfJSLEda5r"
        run: python upload_to_drive.py

      # 9️⃣ Commit solo se cambiato
      - name: Commit feed changes
        if: steps.feed_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit -m "Update feed"
          git push
