name: Build Filtered CSV Feed

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client

    - name: Create service account file
      run: |
        printf "%s" '${{ secrets.GDRIVE_SERVICE_ACCOUNT }}' > service_account.json

    - name: Debug file content
      run: |
        sed -n '1,20p' service_account.json

    - name: Validate JSON
      run: |
        python3 - << 'EOF'
        import json
        try:
            json.load(open("service_account.json"))
            print("JSON OK")
        except Exception as e:
            print("JSON ERROR:", e)
            raise
        EOF

    - name: Run upload script
      run: python upload_to_drive.py
