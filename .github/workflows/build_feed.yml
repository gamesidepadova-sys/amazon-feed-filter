name: Build Filtered CSV Feed

on:
  schedule:
    - cron: '0 * * * *'  # ogni ora
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 4️⃣ Scrivere credenziali service account se servono (solo per Python che usa API Google)
      #    In realtà ora non serve più perché l’upload è gestito da Apps Script
      # - name: Write Service Account JSON
      #   run: |
      #     echo "${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}" > service_account.json

      # 5️⃣ Generazione filtered_clean.csv
      - name: Generate filtered CSV
        run: |
          python filter_feed.py

      # 6️⃣ Conferma
      - name: Confirm
        run: |
          echo "filtered_clean.csv generato localmente. Caricamento su Drive gestito da Apps Script."
