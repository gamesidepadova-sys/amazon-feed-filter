name: Build Feed

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib

      # crea la chiave google
      - name: Create Google service account file
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}" | base64 -d > sa.json

      # valida json (debug utile)
      - name: Validate JSON
        run: |
          python3 - << 'EOF'
          import json
          with open("sa.json") as f:
              json.load(f)
          print("Service account JSON valido")
          EOF

      - name: Generate filtered feed
        run: python process_and_upload.py

      - name: Upload feed to Google Drive
        env:
          FILE_ID: "1DuupFBUm6pfjEZp7js6WDqDfJSLEda5r"
        run: python upload_to_drive.py

      - name: Commit filtered file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add feed_poleepo.csv
          git commit -m "Update feed" || echo "No changes"
          git push
